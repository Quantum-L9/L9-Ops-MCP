name: l9-ops governance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with declared dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Library health
        run: bash scripts/library_health.sh
      - name: Progressive disclosure
        run: bash scripts/enforce_progressive_disclosure.sh
      - name: Hardban duplication audit
        run: bash scripts/audit_hardban_duplication.sh
      - name: Impact analysis
        run: python3 scripts/impact_analysis.py --all
      - name: Convergence status
        run: python3 scripts/convergence_tracker.py
      - name: Wiring validation
        run: python3 scripts/validate_wiring.py --all

  eval-on-demand:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[eval]')
    steps:
      - uses: actions/checkout@v4
      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx promptfoo eval --config evals/promptfooconfig.yaml
