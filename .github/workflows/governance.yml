name: l9-ops governance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Library health
        run: bash scripts/library_health.sh
      - name: Progressive disclosure
        run: bash scripts/enforce_progressive_disclosure.sh
      - name: Hardban duplication audit
        run: bash scripts/audit_hardban_duplication.sh
      # impact_analysis and validate_wiring require MANIFEST.json at the repo
      # root, which is not present in this repo — skip cleanly when absent.
      - name: Impact analysis
        run: |
          if [ -f MANIFEST.json ]; then
            python3 scripts/impact_analysis.py --all
          else
            echo "MANIFEST.json not present at repo root — skipping impact analysis"
          fi
      - name: Convergence status
        run: python3 scripts/convergence_tracker.py
      - name: Wiring validation
        run: |
          if [ -f MANIFEST.json ]; then
            python3 scripts/validate_wiring.py --all
          else
            echo "MANIFEST.json not present at repo root — skipping wiring validation"
          fi

  eval-on-demand:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[eval]')
    steps:
      - uses: actions/checkout@v4
      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx promptfoo eval --config evals/promptfooconfig.yaml
