services:
  neo4j:
    image: neo4j:5.26-community
    container_name: l9-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/l9_local_dev_pw"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_max__size: "2G"
    volumes:
      - l9_neo4j_data:/data
      - l9_neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 8s
      timeout: 4s
      retries: 15
volumes:
  l9_neo4j_data:
  l9_neo4j_logs:
