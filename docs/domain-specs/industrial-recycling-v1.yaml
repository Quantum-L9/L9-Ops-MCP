# L9 Domain Pack: Industrial Recycling GY v1
# Source: Frontier-Grade-AI-Playbook-Architecture.md — domain-pack overlay pattern

domain: "industrial-recycling"
version: "1.0.0"
jurisdiction: "GY"
base_playbooks:
  - "vendor-onboarding-v1"
  - "invoice-ar-processing-v1"
  - "document-extraction-v1"
  - "multi-agent-routing-v1"

overrides:
  vendor-onboarding-v1:
    steps:
      compliance_check:
        additional_validators:
          - "ops.recycling-compliance@^1.0"
        risk_score_threshold: 0.5
      human_review_gate:
        approvers: ["role:environmental-compliance-officer"]
        timeout_seconds: 43200
    inputs:
      permit_number:  { type: string, required: true }
      waste_classes:  { type: array, items: { type: string }, required: true }
    acap_profile:
      jurisdiction: "GY"
      additional_prohibited_actions:
        - "hazardous_waste_approval_without_officer"
        - "export_permit_waiver"

  invoice-ar-processing-v1:
    steps:
      discrepancy_review_gate:
        approvers: ["role:finance-controller"]
        amount_threshold_gyd: 10000000
    inputs:
      currency: { type: string, default: "GYD" }
    acap_profile:
      jurisdiction: "GY"

regulatory_refs:
  - name: "Guyana Environmental Protection Agency — Waste Management Regulations"
    url: "https://epa.org.gy/regulations/waste"
    version: "2024"
  - name: "Guyana Revenue Authority — VAT on Industrial Services"
    url: "https://gra.gov.gy"

metadata:
  created_at: "2026-06-10T00:00:00Z"
  maintainer: "cryptoxdog"
  changelog: "v1.0.0: Initial industrial recycling domain pack for GY"
